name: Python CI/CD
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install fastapi httpx sqlalchemy pydantic pytest flake8 black isort
    - run: |
        echo "🔍 Flake8:"
        flake8 . --max-line-length=120 --extend-ignore=E501,E302,W391,W292 || true
    - run: |
        echo "🎨 Black:"
        black --check . --line-length=120 || true
    - run: |
        echo "📁 Isort:"
        isort . --check-only || true
    - run: |
        echo "🧪 Pytest:"
        pytest tests.py -v
